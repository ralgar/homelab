---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/clusters/metal/apps
  prune: true
  wait: false
  dependsOn:
    - name: cert-manager-config
    - name: crunchy-pgo
    - name: external-secrets-config
    - name: monitoring-controllers
    - name: rook-ceph-config
    - name: vault-config
    - name: volsync
