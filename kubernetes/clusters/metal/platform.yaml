---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/clusters/metal/platform
  prune: true
  wait: false
  dependsOn:
    - name: external-secrets
    - name: rook-ceph-config
