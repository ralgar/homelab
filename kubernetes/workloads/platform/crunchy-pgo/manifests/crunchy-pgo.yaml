---
apiVersion: v1
kind: Namespace
metadata:
  name: postgres-operator
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: crunchy-pgo
spec:
  interval: 120m
  type: oci
  url: oci://registry.developers.crunchydata.com/crunchydata
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crunchy-pgo
spec:
  interval: 5m
  chart:
    spec:
      version: "6.0.0"
      chart: pgo
      sourceRef:
        kind: HelmRepository
        name: crunchy-pgo
      interval: 60m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    relatedImages:
      postgres_14:
        image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres:ubi8-14.11-0
