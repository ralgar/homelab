---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - volsync.yaml
  - monitoring.yaml
configMapGenerator:
  - name: volsync-grafana-dashboard
    files:
      - dashboard/volsync.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: volsync
        app.kubernetes.io/component: monitoring
