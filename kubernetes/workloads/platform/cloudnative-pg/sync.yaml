---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
spec:
  targetNamespace: cloudnative-pg
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/workloads/platform/cloudnative-pg/manifests
  prune: true
  wait: true
  dependsOn:
    - name: monitoring-controllers
