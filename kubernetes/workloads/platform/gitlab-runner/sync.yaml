---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gitlab-runner
spec:
  targetNamespace: gitlab-runner
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/workloads/platform/gitlab-runner/manifests
  prune: true
  wait: true
