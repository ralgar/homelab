---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vault-controller
spec:
  targetNamespace: vault
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/workloads/platform/vault/controller
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vault-config
  namespace: flux-system
spec:
  targetNamespace: vault
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/workloads/platform/vault/config
  prune: true
  wait: true
  dependsOn:
    - name: vault-controller
