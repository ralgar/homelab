---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - rook-ceph-config.yaml
  - exporter-service-monitor.yaml
  - service-monitor.yaml
configMapGenerator:
  - name: rook-ceph-grafana-dashboards
    files:
      - dashboards/ceph-cluster.json
      - dashboards/ceph-osd.json
      - dashboards/ceph-pools.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: rook-ceph
        app.kubernetes.io/component: monitoring
