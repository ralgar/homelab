---
apiVersion: v1
kind: Namespace
metadata:
  name: ceph-premium
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-premium
  namespace: ceph-premium
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
    namespace: rook-ceph
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  # https://github.com/rook/rook/blob/master/deploy/charts/rook-ceph-cluster/values.yaml
  values:
    configOverride: |
      [global]
      osd_pool_default_size = 1
      osd_pool_default_min_size = 1
      mon_warn_on_pool_no_redundancy = false
      # newline to prevent parse error (rook bug?)
    toolbox:
      enabled: true
    monitoring:
      # Disabled because Rook/Ceph do not handle multi-cluster monitoring well.
      # This cluster is on the node's system disk (SSD) anyway, and any data
      #  stored on this cluster should either be ephemeral or backed up.
      enabled: false

    cephClusterSpec:
      dataDirHostPath: /var/mnt/rook/premium
      mon:
        count: 1
      mgr:
        count: 1
        modules:
          - name: pg_autoscaler
            enabled: true
          - name: dashboard
            enabled: false
          - name: nfs
            enabled: false
      dashboard:
        enabled: false
        ssl: false
      storage:  # Use the exact partition label on all nodes
        useAllNodes: true
        useAllDevices: false
        devicePathFilter: /dev/disk/by-partlabel/r-nvme-osd
      resources:
        osd:  # Tone down the default OSD requests
          requests:
            cpu: 500m
            memory: 1Gi

    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: osd
          replicated:
            size: 1
        storageClass:
          enabled: true
          name: premium-block
          isDefault: false
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          mountOptions:
            - discard  # This is an SSD, we need discard.
          parameters:
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4  # ext4 is the recommended filesystem
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: premium-block
      isDefault: false
      deletionPolicy: Delete

    # Override to disable unwanted defaults
    cephFileSystems: []
    cephFileSystemVolumeSnapshotClass:
      enabled: false
    cephObjectStores: []
---
# Overrides size and failureDomain for builtin .mgr pool, since Rook Ceph
#  doesn't provide any way to configure this in the Helm chart directly.
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: builtin-mgr
  namespace: ceph-premium # namespace:cluster
spec:
  name: .mgr
  enableCrushUpdates: true  # Required to update failureDomain
  failureDomain: osd
  replicated:
    size: 1
    requireSafeReplicaSize: false
