---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rook-ceph-controller
spec:
  targetNamespace: rook-ceph
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/workloads/system/rook-ceph/controller
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rook-ceph-config
spec:
  targetNamespace: rook-ceph
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/workloads/system/rook-ceph/config
  prune: true
  wait: true
  dependsOn:
    - name: rook-ceph-controller
    - name: snapshot-controller
