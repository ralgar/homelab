---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
spec:
  interval: 120m
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 5m
  chart:
    spec:
      version: "86.2.3"
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 60m
  timeout: 10m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
  values:
    cleanPrometheusOperatorObjectNames: true
    kubeProxy:
      enabled: false  # Replaced by Cilium
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver  # etcd runs on control plane nodes
    prometheus:
      route:
        main:
          enabled: true
          hostnames:
            - prometheus.omnicosm.net
          parentRefs:
            - name: private
              namespace: networking
      prometheusSpec:
        externalUrl: https://prometheus.omnicosm.net
        retention: 24h
        resources:
          requests:
            cpu: 200m
            memory: 200Mi
        # Pick up all monitors, regardless of labelling.
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
    alertmanager:
      enabled: true
      podDisruptionBudget:
        enabled: false
        minAvailable: 1
      route:
        main:
          enabled: true
          hostnames:
            - alertmanager.omnicosm.net
          parentRefs:
            - name: private
              namespace: networking
      alertmanagerSpec:
        configSecret: alertmanager-config
        secrets:
          - alertmanager-credentials
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
    grafana:
      enabled: false
      forceDeployDashboards: true
      operator:
        dashboardsConfigMapRefEnabled: true
        folder: monitoring
        matchLabels:
          dashboards: grafana
