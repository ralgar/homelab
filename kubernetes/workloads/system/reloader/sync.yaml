---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: reloader
spec:
  targetNamespace: kube-system
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/workloads/system/reloader/manifests
  prune: true
  wait: true
  dependsOn:
    - name: monitoring-controllers
