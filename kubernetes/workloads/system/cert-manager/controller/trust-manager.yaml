---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
spec:
  dependsOn:
    - name: cert-manager
  interval: 5m
  chart:
    spec:
      version: "v0.22.0"
      chart: trust-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 60m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values: {}
