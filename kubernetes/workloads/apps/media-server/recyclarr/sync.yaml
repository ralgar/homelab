---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: recyclarr
spec:
  targetNamespace: media-server
  interval: 1h
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/workloads/apps/media-server/recyclarr/manifests
  dependsOn:
    - name: radarr
    - name: sonarr
  components:
    - ../../../../../components/volsync
  postBuild:
    substitute:
      APP: recyclarr
      BACKUPS__S3_BUCKET: cluster-backups-4265
      BACKUPS__S3_ENDPOINT: s3.us-west-004.backblazeb2.com
