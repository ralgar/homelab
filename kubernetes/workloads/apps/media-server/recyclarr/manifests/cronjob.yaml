---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      name: recyclarr
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:8.5.1@sha256:734cecf44ae9be7cf0cb05b2c1bc7da0abef9d938cc11b605e58b3146205e5c0
              imagePullPolicy: IfNotPresent
              args: ["sync"]
              env:
                - name: RECYCLARR_DATA_DIR
                  value: /tmp
                - name: RADARR_API_KEY
                  valueFrom: { secretKeyRef: { name: radarr-secrets, key: apiKey } }
                - name: SONARR_API_KEY
                  valueFrom: { secretKeyRef: { name: sonarr-secrets, key: apiKey } }
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: configmap
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: recyclarr
            - name: configmap
              configMap:
                name: recyclarr-config
            - name: tmp
              emptyDir: {}
