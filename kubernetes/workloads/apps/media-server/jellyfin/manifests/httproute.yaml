---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  labels:
    app.kubernetes.io/name: jellyfin
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jellyfin
  ports:
    - name: http
      port: 8096
      protocol: TCP
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin
  labels:
    app.kubernetes.io/name: jellyfin
spec:
  parentRefs:
    - name: public
      namespace: networking
      sectionName: https
  hostnames:
    - stream.${DOMAIN}
  rules:
    # Block Prometheus metrics (no backend)
    - matches:
        - path:
            type: Exact
            value: /metrics
    # Allow everything else
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jellyfin
          port: 8096
