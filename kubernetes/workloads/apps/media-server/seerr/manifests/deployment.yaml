---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: media-server
  labels:
    app.kubernetes.io/name: seerr
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seerr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seerr
    spec:
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      securityContext:
        runAsUser: 105055
        runAsGroup: 105055
        fsGroup: 105055
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:v3.0.1@sha256:1b5fc1ea825631d9d165364472663b817a4c58ef6aa1013f58d82c1570d7c866
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_TYPE
              value: postgres
            - name: DB_HOST
              valueFrom: { secretKeyRef: { name: media-server-pguser-seerr, key: host } }
            - name: DB_PORT
              valueFrom: { secretKeyRef: { name: media-server-pguser-seerr, key: port } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: media-server-pguser-seerr, key: user } }
            - name: DB_PASS
              valueFrom: { secretKeyRef: { name: media-server-pguser-seerr, key: password } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: media-server-pguser-seerr, key: dbname } }
            - name: DB_USE_SSL
              value: "true"
            - name: DB_SSL_REJECT_UNAUTHORIZED
              value: "false"
          ports:
            - name: seerr-http
              containerPort: &port 5055
              protocol: TCP
          volumeMounts:
            - name: seerr-config
              mountPath: /app/config
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 250Mi
            limits:
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: *port
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: *port
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            tcpSocket:
              port: *port
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
      volumes:
        - name: seerr-config
          persistentVolumeClaim:
            claimName: seerr
        - name: tmp
          emptyDir: {}
