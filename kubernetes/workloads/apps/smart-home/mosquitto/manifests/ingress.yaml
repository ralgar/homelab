---
apiVersion: v1
kind: Service
metadata:
  name: mqtt
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    - name: mosquitto-http
      port: 1883
      protocol: TCP
      targetPort: mosquitto-http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mqtt
  labels:
    app.kubernetes.io/name: mqtt
  annotations:
    external-dns.alpha.kubernetes.io/hostname: mqtt.${DOMAIN}
spec:
  parentRefs:
    - name: private
      namespace: networking
      sectionName: https
  hostnames:
    - mqtt.${DOMAIN}
  rules:
    - backendRefs:
        - name: mqtt
          port: 1883
