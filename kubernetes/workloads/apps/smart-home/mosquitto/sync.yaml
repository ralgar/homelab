---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mosquitto
spec:
  targetNamespace: smart-home
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/workloads/apps/smart-home/mosquitto/manifests
  prune: true
  wait: true
  postBuild:
    substitute:
      DOMAIN: staging.omnicosm.net
