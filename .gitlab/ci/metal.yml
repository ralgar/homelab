---
variables:
  TF_ROOT: ${CI_PROJECT_DIR}/metal

tf-validate:
  stage: validate
  image: registry.gitlab.com/gitlab-org/terraform-images/releases/terraform:1.5.7
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - metal/**/*
  script:
    - gitlab-terraform validate
